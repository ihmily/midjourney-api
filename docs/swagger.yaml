basePath: /
definitions:
  handler.AccountView:
    properties:
      channel_id:
        type: string
      concurrent_limit:
        type: integer
      created_at:
        type: string
      current_jobs:
        type: integer
      error_count:
        type: integer
      guild_id:
        type: string
      id:
        type: integer
      is_disabled:
        type: boolean
      is_healthy:
        type: boolean
      last_error:
        type: string
      last_used_at:
        type: string
      success_count:
        type: integer
      updated_at:
        type: string
    type: object
  handler.CreateAccountReq:
    properties:
      channel_id:
        type: string
      guild_id:
        type: string
      user_token:
        type: string
    required:
    - channel_id
    - guild_id
    - user_token
    type: object
  handler.CreateDescribeTaskReq:
    properties:
      callback_url:
        type: string
      image_url:
        type: string
    required:
    - image_url
    type: object
  handler.CreateImagineTaskReq:
    properties:
      callback_url:
        type: string
      prompt:
        type: string
    required:
    - prompt
    type: object
  handler.PerformTaskActionReq:
    properties:
      action_type:
        description: Operation type
        type: string
      callback_url:
        type: string
      index:
        description: 'Index: 1-4'
        type: integer
      task_id:
        description: Original task ID
        type: string
    required:
    - action_type
    - index
    - task_id
    type: object
  handler.TaskListResponse:
    properties:
      tasks:
        items:
          $ref: '#/definitions/handler.TaskView'
        type: array
      total:
        type: integer
    type: object
  handler.TaskView:
    properties:
      created_at:
        type: string
      description:
        type: string
      error_message:
        type: string
      finished_at:
        type: string
      image_url:
        type: string
      oss_image_url:
        type: string
      parent_task_id:
        type: string
      progress:
        type: integer
      prompt:
        type: string
      status:
        $ref: '#/definitions/model.TaskStatus'
      task_id:
        type: string
      type:
        $ref: '#/definitions/model.TaskType'
      updated_at:
        type: string
    type: object
  handler.UpdateAccountReq:
    properties:
      channel_id:
        type: string
      concurrent_limit:
        type: integer
      guild_id:
        type: string
      is_disabled:
        type: boolean
      user_token:
        type: string
    type: object
  model.TaskStatus:
    enum:
    - PENDING
    - SUBMITTED
    - IN_QUEUE
    - PROCESSING
    - SUCCESS
    - FAILED
    - TIMEOUT
    type: string
    x-enum-varnames:
    - TaskStatusPending
    - TaskStatusSubmitted
    - TaskStatusInQueue
    - TaskStatusProcessing
    - TaskStatusSuccess
    - TaskStatusFailed
    - TaskStatusTimeout
  model.TaskType:
    enum:
    - IMAGINE
    - DESCRIBE
    - UPSCALE
    - ZOOM_OUT_2X
    - ZOOM_OUT_1_5X
    - UPSCALE_SUBTLE
    - UPSCALE_CREATIVE
    type: string
    x-enum-comments:
      TaskTypeDescribe: Describe image
      TaskTypeUpscale: Upscale
      TaskTypeUpscaleCreative: Upscale (Creative)
      TaskTypeUpscaleSubtle: Upscale (Subtle)
      TaskTypeZoomOut1_5x: Zoom Out 1.5x
      TaskTypeZoomOut2x: Zoom Out 2x
    x-enum-descriptions:
    - ""
    - Describe image
    - Upscale
    - Zoom Out 2x
    - Zoom Out 1.5x
    - Upscale (Subtle)
    - Upscale (Creative)
    x-enum-varnames:
    - TaskTypeImagine
    - TaskTypeDescribe
    - TaskTypeUpscale
    - TaskTypeZoomOut2x
    - TaskTypeZoomOut1_5x
    - TaskTypeUpscaleSubtle
    - TaskTypeUpscaleCreative
  response.Response:
    properties:
      code:
        type: string
      data: {}
      detail:
        type: string
      message:
        type: string
    type: object
  service.ProcessingQueueItem:
    properties:
      created_at:
        type: string
      description:
        type: string
      finished_at:
        type: string
      image_url:
        type: string
      oss_image_url:
        type: string
      parent_task_id:
        type: string
      progress:
        type: integer
      prompt:
        type: string
      status:
        $ref: '#/definitions/model.TaskStatus'
      task_id:
        type: string
      type:
        $ref: '#/definitions/model.TaskType'
      updated_at:
        type: string
    type: object
  service.QueueItem:
    properties:
      image_url:
        type: string
      kind:
        $ref: '#/definitions/service.QueueMessageKind'
      parent_task_id:
        type: string
      prompt:
        type: string
      task_id:
        type: string
    type: object
  service.QueueMessageKind:
    enum:
    - imagine
    - describe
    - action
    type: string
    x-enum-varnames:
    - QueueMessageKindImagine
    - QueueMessageKindDescribe
    - QueueMessageKindAction
  service.QueueStatus:
    properties:
      processing_count:
        type: integer
      processing_tasks:
        items:
          $ref: '#/definitions/service.ProcessingQueueItem'
        type: array
      queue_length:
        type: integer
      waiting_in_queue:
        items:
          $ref: '#/definitions/service.QueueItem'
        type: array
    type: object
  service.TaskResponse:
    properties:
      status:
        $ref: '#/definitions/model.TaskStatus'
      task_id:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: Midjourney Proxy API Service
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Midjourney Proxy API
  version: "1.0"
paths:
  /api/v1/accounts:
    get:
      description: Get all account list
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/handler.AccountView'
                  type: array
              type: object
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      summary: List accounts
      tags:
      - Account
    post:
      consumes:
      - application/json
      description: Create a new Discord account with the default concurrent limit
        and start its listener. Only guild_id, channel_id, and user_token are accepted.
      parameters:
      - description: Account info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateAccountReq'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/handler.AccountView'
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Create account
      tags:
      - Account
  /api/v1/accounts/{id}:
    delete:
      description: Delete the specified account and stop its listener. Accounts with
        active tasks cannot be deleted until current_jobs is 0.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Account not found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Delete account
      tags:
      - Account
    put:
      consumes:
      - application/json
      description: Update the specified Discord account. At least one field must be
        provided. is_healthy is read-only and managed by listener checks; use the
        restart endpoint to re-check an account. While current_jobs is greater than
        0, listener-changing fields (guild_id, channel_id, user_token, and disabling
        the account) are rejected; concurrent_limit can still be changed.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      - description: Account info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateAccountReq'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/handler.AccountView'
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Account not found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Update account
      tags:
      - Account
  /api/v1/accounts/{id}/restart:
    post:
      description: Restart the specified Discord account listener. is_healthy is managed
        by the server and will be updated after the listener verifies the account.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/handler.AccountView'
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Account not found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Restart account listener
      tags:
      - Account
  /api/v1/tasks:
    get:
      description: Get the task list
      parameters:
      - default: 10
        description: Page size
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/handler.TaskListResponse'
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      summary: List tasks
      tags:
      - Task
  /api/v1/tasks/{task_id}:
    get:
      description: Get task details by task ID
      parameters:
      - description: Task ID
        in: path
        name: task_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/handler.TaskView'
              type: object
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get task status
      tags:
      - Task
  /api/v1/tasks/action:
    post:
      consumes:
      - application/json
      description: Perform an action on a completed task (upscale, zoom_out_2x, zoom_out_1_5x,
        upscale_subtle, upscale_creative)
      parameters:
      - description: Action request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.PerformTaskActionReq'
      produces:
      - application/json
      responses:
        "201":
          description: Action submitted
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/service.TaskResponse'
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Perform task action
      tags:
      - Task
  /api/v1/tasks/describe:
    post:
      consumes:
      - application/json
      description: Create a Midjourney describe task that generates text prompts based
        on an image URL
      parameters:
      - description: Describe task request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateDescribeTaskReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created successfully
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/service.TaskResponse'
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Create Describe task
      tags:
      - Task
  /api/v1/tasks/imagine:
    post:
      consumes:
      - application/json
      description: Create a Midjourney image generation task based on the given prompt
      parameters:
      - description: Task request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateImagineTaskReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created successfully
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/service.TaskResponse'
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Create Imagine task
      tags:
      - Task
  /api/v1/tasks/queue:
    get:
      description: Get the list of tasks currently waiting to be processed
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/service.QueueStatus'
              type: object
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get queue list
      tags:
      - Task
  /live:
    get:
      description: Check if the service is alive (simple ping)
      produces:
      - application/json
      responses:
        "200":
          description: Service is alive
          schema:
            $ref: '#/definitions/response.Response'
      summary: Liveness check
      tags:
      - System
schemes:
- http
- https
swagger: "2.0"
