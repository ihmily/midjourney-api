name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.2'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Generate Swagger docs
        run: make docs

      - name: Build Linux amd64
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/midjourney-api-linux-amd64 \
            ./cmd/server

      - name: Build Linux arm64
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: arm64
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/midjourney-api-linux-arm64 \
            ./cmd/server

      - name: Build Windows amd64
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/midjourney-api-windows-amd64.exe \
            ./cmd/server

      - name: Build Windows arm64
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: arm64
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/midjourney-api-windows-arm64.exe \
            ./cmd/server

      - name: Package with config template
        run: |
          cp -r config dist/
          cp dist/config/config.yaml.example dist/config/config.yaml
          cd dist
          tar -czf midjourney-api-linux-amd64.tar.gz midjourney-api-linux-amd64 config
          tar -czf midjourney-api-linux-arm64.tar.gz midjourney-api-linux-arm64 config
          zip -r midjourney-api-windows-amd64.zip midjourney-api-windows-amd64.exe config
          zip -r midjourney-api-windows-arm64.zip midjourney-api-windows-arm64.exe config

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/midjourney-api-linux-amd64.tar.gz
            dist/midjourney-api-linux-arm64.tar.gz
            dist/midjourney-api-windows-amd64.zip
            dist/midjourney-api-windows-arm64.zip
